version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: currency
      POSTGRES_PASSWORD: currencypw
      POSTGRES_DB: currencydb
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  postgrest:
    image: postgrest/postgrest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGRST_DB_URI: "postgres://currency:currencypw@db:5432/currencydb"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_DB_SCHEMA: "public"
    ports:
      - "3001:3000"

volumes:
  db-data:
